services:
  automatizador:
    build: .
    container_name: automatizador-veed
    ports:
      - "${PORT:-3000}:3000"
      - "${NOVNC_PORT:-6080}:6080"
    environment:
      - NODE_ENV=production
      - HEADLESS=true
      - NOVNC_PORT=6080
    env_file:
      - .env
    volumes:
      - ./.auth:/app/.auth
      # Persistir screenshots, guiones y videos generados
      - ./screenshots:/app/screenshots
      - ./guiones:/app/guiones
      - ./videos:/app/videos
      - ./logs:/app/logs
    restart: unless-stopped
    # Configuración de memoria y CPU para el contenedor
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
